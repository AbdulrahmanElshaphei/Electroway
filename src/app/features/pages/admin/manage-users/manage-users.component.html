<app-navbar role="admin"></app-navbar>
<div class="page-bg">
  <div class="page-container py-4">
    <div class="d-flex align-items-center justify-content-between mb-4">
      <div><h1 class="page-heading">Manage Users</h1><p class="page-sub">All registered drivers and station owners.</p></div>
      <div class="toolbar">
        <div class="search-box"><i class="bi bi-search"></i><input type="text" placeholder="Search by name or email..." [(ngModel)]="search" (ngModelChange)="onSearchChange()"></div>
        <select class="ew-input" style="width:130px" [(ngModel)]="roleFilter" (change)="onFilterChange()">
          <option value="">All roles</option><option value="Driver">Driver</option><option value="Owner">Owner</option>
        </select>
        <select class="ew-input" style="width:130px" [(ngModel)]="statusFilter" (change)="onFilterChange()">
          <option value="">All status</option><option value="Active">Active</option><option value="Suspended">Suspended</option>
        </select>
      </div>
    </div>
    <div class="ew-card p-0">
      <table class="ew-table">
        <thead><tr><th>User</th><th>Role</th><th>Joined</th><th>Sessions</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody>
          <tr *ngFor="let u of users">
            <td>
              <div class="user-cell">
                <div class="u-av">{{getInitials(u.fullName)}}</div>
                <div><div class="u-name">{{u.fullName}}</div><div class="u-email">{{u.email}}</div></div>
              </div>
            </td>
            <td><span class="role-tag" [ngClass]="u.role==='Driver'?'role-driver':'role-owner'">{{u.role}}</span></td>
            <td class="text-muted">{{u.joinedAt | date:'mediumDate'}}</td>
            <td>{{u.sessionsCount}}</td>
            <td><span [ngClass]="u.status==='Active'?'badge-available':'badge-out'">{{u.status}}</span></td>
            <td>
              <div class="action-btns">
                <a [routerLink]="['/admin/users', u.userId]" class="btn-action-view"><i class="bi bi-eye"></i></a>
                <button class="btn-action-warn" (click)="toggleStatus(u)"><i class="bi bi-slash-circle"></i></button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
