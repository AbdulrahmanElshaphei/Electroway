<app-navbar role="owner"></app-navbar>
<div class="page-bg">
  <div class="page-container py-4">
    <h1 class="page-heading">Customer reviews</h1>
    <p class="page-sub">What drivers are saying about your stations.</p>

    <div *ngIf="loading" style="padding:40px 0;text-align:center">
      <i class="bi bi-arrow-repeat spin" style="font-size:24px"></i>
    </div>

    <div *ngIf="!loading && loadError" class="map-load-error mb-3">
      <i class="bi bi-exclamation-triangle"></i> {{loadError}}
    </div>

    <div class="reviews-layout" *ngIf="!loading && !loadError">
      <div class="rating-summary ew-card">
        <div class="rs-score">{{averageScore || '—'}}</div>
        <div class="rs-stars">{{averageStars}}</div>
        <div class="rs-count">{{reviews.length}} review{{reviews.length === 1 ? '' : 's'}}</div>
      </div>
      <div class="reviews-grid">
        <div class="review-card ew-card" *ngFor="let r of reviews">
          <div class="rv-header">
            <div class="rv-avatar">{{r.initials}}</div>
            <div><div class="rv-name">{{r.name}}</div><div class="rv-date">{{r.date}}</div></div>
            <div class="rv-stars ms-auto">{{r.stars}}</div>
          </div>
          <p class="rv-text">{{r.text}}</p>
        </div>
        <p class="text-muted" *ngIf="!reviews.length" style="padding:20px 0">No reviews yet.</p>
      </div>
    </div>
  </div>
</div>
