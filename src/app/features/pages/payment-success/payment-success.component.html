<div class="ps-page">
  <a class="ew-logo" routerLink="/"><div class="ew-logo-icon"><svg viewBox="0 0 24 24"><path d="M13 2L4.09 12.26a1 1 0 0 0 .91 1.74H11v8l8.91-10.26a1 1 0 0 0-.91-1.74H13V2z"/></svg></div><span class="ew-logo-text">Electro<span>Way</span></span></a>
  <div class="ps-body">
    <div class="ps-check"><i class="bi bi-check-lg"></i></div>
    <h1 class="ps-title">Payment Successful</h1>
    <p class="ps-sub">Thank you for using Electro Way. Your receipt has been saved to your account.</p>
    <div class="ps-summary">
      <div class="ps-row"><span>Total paid</span><strong>EGP {{session.total.toFixed(2)}}</strong></div>
      <div class="ps-row"><span>Transaction ID</span><strong>{{session.transactionId}}</strong></div>
      <div class="ps-row" *ngIf="session.cardLast4"><span>Paid with</span><strong>Card •• {{session.cardLast4}}</strong></div>
    </div>
    <div class="ps-actions">
      <button class="btn-ew-outline" (click)="downloadReceipt()" [disabled]="downloading">
        <i class="bi" [ngClass]="downloading ? 'bi-hourglass-split' : 'bi-download'"></i>
        {{downloading ? 'Preparing…' : 'Download Receipt'}}
      </button>
      <a routerLink="/dashboard" class="btn-ew-dark"><i class="bi bi-house-fill"></i> Back to Home</a>
    </div>
  </div>
</div>
